services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ratmaster
      POSTGRES_PASSWORD: ratmaster
      POSTGRES_DB: ratmaster
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ratmaster']
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgres://ratmaster:ratmaster@db:5432/ratmaster
      PORT: 3000
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: node --watch src/index.js

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    environment:
      API_URL: http://api:3000
    ports:
      - '5173:5173'
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: npx vite --host

volumes:
  pg-data:
